name: Post blog stories to X

on:
  schedule:
    - cron: "17 8,12,17 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:
    inputs:
      slot:
        description: "Which daily queue slot should be used?"
        required: true
        default: morning
        type: choice
        options:
          - morning
          - midday
          - evening
      dry_run:
        description: "Preview without publishing"
        required: true
        default: true
        type: boolean
      run_date:
        description: "Optional Pacific test date (YYYY-MM-DD)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: cooltravelpal-x-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out website
        uses: actions/checkout@v6

      - name: Select and validate post
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SLOT: ${{ inputs.slot }}
          MANUAL_DATE: ${{ inputs.run_date }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: |
          slot="auto"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            slot="$MANUAL_SLOT"
          fi
          args=(--slot "$slot" --dry-run)
          if [[ -n "$MANUAL_DATE" ]]; then
            args+=(--date "$MANUAL_DATE")
          fi
          python3 scripts/post_to_x.py "${args[@]}"

      - name: Queue for @cooltravelpal through Buffer
        if: >-
          (github.event_name == 'schedule' && vars.X_AUTOMATION_ENABLED == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SLOT: ${{ inputs.slot }}
          MANUAL_DATE: ${{ inputs.run_date }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: |
          slot="auto"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            slot="$MANUAL_SLOT"
          fi
          args=(--slot "$slot")
          if [[ -n "$MANUAL_DATE" ]]; then
            args+=(--date "$MANUAL_DATE")
          fi
          python3 scripts/post_to_x.py "${args[@]}"
